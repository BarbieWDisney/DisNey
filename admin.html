<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - Dis Ney</title>
    
    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/admin-style.css">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
</head>
<body>
    <!-- ===== الهيدر ===== -->
    <header>
        <div class="header-container">
            <div class="logo">
                <span class="logo-icon">🔐</span>
                <span class="logo-text">لوحة التحكم</span>
            </div>
            <nav>
                <ul>
                    <li><a href="index.html">🏠 الرئيسية</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <!-- ===== المحتوى ===== -->
    <div class="admin-container">
        
        <!-- ===== شاشة تسجيل الدخول ===== -->
        <div id="loginForm" class="login-form">
            <div class="lock-icon">🔐</div>
            <h2>لوحة التحكم</h2>
            <p>أدخل كلمة المرور للوصول</p>
            
            <input 
                type="password" 
                id="adminPassword" 
                placeholder="••••••••" 
                class="admin-input" 
                autofocus
            >
            
            <div id="loginError" class="login-error"></div>
            
            <button onclick="loginAdmin()" class="btn-primary" style="width: 100%;">
                🔓 دخول
            </button>
            
            <div style="margin-top: 15px; font-size: 12px; color: #999;">
                <span id="attemptsDisplay"></span>
            </div>
        </div>

        <!-- ===== لوحة التحكم ===== -->
        <div id="adminPanel" style="display: none;">
            <div class="admin-header">
                <h1>📦 إدارة المنتجات</h1>
                <button onclick="logoutAdmin()" class="btn-logout">
                    🚪 خروج
                </button>
            </div>
            
            <!-- ===== إضافة منتج ===== -->
            <div class="admin-card">
                <h2>➕ إضافة منتج جديد</h2>
                <form id="addProductForm" class="admin-form">
                    <div class="form-row">
                        <div class="form-group">
                            <label>اسم المنتج *</label>
                            <input type="text" id="productName" required class="admin-input" placeholder="مثل: دمية ميكي ماوس">
                        </div>
                        <div class="form-group">
                            <label>السعر (ج.م) *</label>
                            <input type="number" id="productPrice" required step="0.01" class="admin-input" placeholder="مثل: 150">
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label>التصنيف *</label>
                            <select id="productCategory" required class="admin-input">
                                <option value="دمى أصلية">🧸 دمى أصلية</option>
                                <option value="أعمال يدوية">🎨 أعمال يدوية</option>
                                <option value="ألعاب">🎮 ألعاب</option>
                                <option value="هدايا">🎁 هدايا</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>الكمية في المخزون *</label>
                            <input type="number" id="productStock" required min="0" class="admin-input" placeholder="مثل: 10">
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label>الشرح المفصل *</label>
                        <textarea id="productDescription" required rows="4" class="admin-input" 
                                  placeholder="اكتب شرحاً مفصلاً عن المنتج..."></textarea>
                    </div>
                    
                    <div class="form-group">
                        <label>صورة المنتج *</label>
                        <input type="file" id="productImage" accept="image/*" required class="admin-input file-input">
                        <small style="color: #888;">يُفضل استخدام صور بحجم 500x500 بكسل</small>
                    </div>
                    
                    <div id="uploadProgress" class="progress-bar" style="display: none;">
                        <div id="progressFill" class="progress-fill" style="width: 0%;"></div>
                        <span id="progressText" style="display: block; text-align: center; margin-top: 5px; font-size: 14px; color: #666;">0%</span>
                    </div>
                    
                    <button type="submit" class="btn-primary btn-submit" style="width: 100%;">
                        ➕ إضافة المنتج
                    </button>
                </form>
            </div>

            <!-- ===== قائمة المنتجات ===== -->
            <div class="admin-card">
                <h2>📋 قائمة المنتجات</h2>
                <div id="productsList">
                    <div class="loading">⏳ جاري تحميل المنتجات...</div>
                </div>
            </div>
        </div>
    </div>

    <!-- ===== JavaScript ===== -->
    <script src="js/firebase-config.js"></script>
    <script src="js/admin-script.js"></script>
</body>
</html>
